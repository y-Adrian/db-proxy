# 本仓库的示例 INI 已按后端拆到 conf/ 目录，避免在 MySQL 与 PostgreSQL 之间来回改同一文件。
#
#   conf/proxy.mysql.conf        — 代理监听 6033 → 后端 MySQL（默认）
#   conf/proxy.postgresql.conf   — 代理监听 6432 → 后端 PostgreSQL
#
# 启动示例（在仓库根目录）：
#   ./build/db-proxy -c conf/proxy.mysql.conf
#   ./build/db-proxy -c conf/proxy.postgresql.conf
#
# 未指定 -c 时，主程序默认读取：conf/proxy.mysql.conf（路径相对于当前工作目录）。
#
# 以下为占位：若仍用本文件名作为 -c 参数，请改为复制 conf 中任一份内容到此文件。

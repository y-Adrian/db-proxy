# db-proxy 配置文件
# 格式：INI（[section] / key = value）
# 注释：以 # 开头的行，或行内 ; 之后的内容

# ── 代理服务器 ────────────────────────────────────────────────
[server]
host            = 0.0.0.0
port            = 6033        ; 代理对外监听端口（避免与后端 MySQL 3306 冲突）
max_connections = 10000       ; 预留：当前未用于 accept 限流
worker_threads  = 4           ; 已 accept 的客户端会话在工作线程内阻塞透传（非 epoll 内阻塞）
backlog         = 128         ; 预留：listen backlog 当前为代码内固定值，未读此配置

# ── 连接池 ────────────────────────────────────────────────────
[pool]
min_connections           = 10     ; 启动时预热的已认证连接数
max_connections           = 100    ; 池上限 = 可同时透传的最大客户端会话数
max_idle_time_ms          = 30000  ; 空闲连接最大空闲时间（ms）
connection_timeout_ms     = 5000   ; 从池借连接等待超时（ms）；非 SQL 超时
health_check_interval_ms  = 10000  ; 后台 ping 间隔（ms）
enable_connection_reuse   = true   ; 池在槽位间复用；非多个客户端共享单条后端 TCP

# ── 后端数据库（第一个 [database.*] 节为主库）─────────────────
# 线协议：protocol = mysql | postgresql | postgres | pg（池内握手协议；主程序对该后端做字节透传）
# PostgreSQL 与 MySQL caching_sha2_password 的 RSA 完整认证依赖带 OpenSSL 的构建（CMake 找到 OpenSSL）。
[database.primary]
host     = 127.0.0.1
port     = 3306
user     = root
password =
database = test
charset  = utf8mb4
protocol = mysql

# PostgreSQL 示例（改用代理监听端口如 6432 以免与 MySQL 6033 混淆）：
# [server]
# port = 6432
# [database.primary]
# host     = 127.0.0.1
# port     = 5432
# user     = 你的系统用户名
# password =
# database = test
# protocol = postgresql

# 需要代理多个数据库时，继续添加节（PoolManager 扩展方向）：
# [database.analytics]
# host     = 10.0.0.5
# port     = 5432
# user     = analyst
# password = secret
# database = analytics

# ── 监控 ──────────────────────────────────────────────────────
[monitor]
enable                  = true
metrics_interval_ms     = 1000    ; 统计日志与池 Gauge 同步周期（毫秒）
metrics_host            = 127.0.0.1 ; GET /metrics 绑定地址（可用 0.0.0.0）
metrics_port            = 0       ; 0=关闭；非 0 开启 Prometheus HTTP（例如 19100）
slow_query_threshold_ms = 100     ; 单条客户端代理会话持续时间阈值（毫秒），超过打 WARN
enable_query_logging    = false   ; true 时每个代理会话结束打一条 INFO（无 SQL）

# ── 日志 ──────────────────────────────────────────────────────
[log]
level = INFO           ; DEBUG / INFO / WARN / ERROR
file  = ./logs/proxy.log

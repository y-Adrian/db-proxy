# db-proxy — MySQL 后端示例配置
# 启动：./db-proxy -c conf/proxy.mysql.conf（仓库根目录）
# 若在 build/ 下运行：./db-proxy -c ../conf/proxy.mysql.conf

# ── 代理服务器 ────────────────────────────────────────────────
[server]
host            = 0.0.0.0
port            = 6033        ; 与后端 MySQL 3306 区分
max_connections = 10000
worker_threads  = 4
backlog         = 128

# ── 连接池 ────────────────────────────────────────────────────
[pool]
min_connections           = 10
max_connections           = 100
max_idle_time_ms          = 30000
connection_timeout_ms     = 5000
health_check_interval_ms  = 10000
enable_connection_reuse   = true

# ── 后端：MySQL ───────────────────────────────────────────────
# 线协议固定为 mysql；caching_sha2 RSA 完整认证需 OpenSSL 构建。
[database.primary]
host     = 127.0.0.1
port     = 3306
user     = root
password =
database = test
charset  = utf8mb4
protocol = mysql

# ── 监控 ──────────────────────────────────────────────────────
[monitor]
enable                  = true
metrics_interval_ms     = 1000
metrics_host            = 127.0.0.1
metrics_port            = 0
slow_query_threshold_ms = 100
enable_query_logging    = false

# ── 日志 ──────────────────────────────────────────────────────
[log]
level = INFO
file  = ./logs/proxy.log

# db-proxy — PostgreSQL 后端示例配置
# 启动：./db-proxy -c conf/proxy.postgresql.conf（仓库根目录）
# 若在 build/ 下运行：./db-proxy -c ../conf/proxy.postgresql.conf
#
# 需 CMake 找到 OpenSSL 且启用 PostgreSQL 池实现。切换 PG 时无需改 MySQL 那份配置。

# ── 代理服务器（端口与 MySQL 代理 6033 错开，可同时各跑一实例）──
[server]
host            = 0.0.0.0
port            = 6432
max_connections = 10000
worker_threads  = 4
backlog         = 128

# ── 连接池 ────────────────────────────────────────────────────
[pool]
min_connections           = 10
max_connections           = 100
max_idle_time_ms          = 30000
connection_timeout_ms     = 5000
health_check_interval_ms  = 10000
enable_connection_reuse   = true

# ── 后端：PostgreSQL ─────────────────────────────────────────
# 角色名：Docker 官方镜像常用 postgres；Homebrew 通常**没有** postgres，超级用户为当前登录名。
# 下面不写 user（或 user 留空）时，主程序会用环境变量 USER，与 `whoami` 一致，免改配置即可连本机 PG。
# 若你使用 Docker PG，请在本节增加一行：user = postgres
[database.primary]
host     = 127.0.0.1
port     = 5432
password =
database = test
charset  = UTF8
protocol = postgresql

# ── 监控 ──────────────────────────────────────────────────────
[monitor]
enable                  = true
metrics_interval_ms     = 1000
metrics_host            = 127.0.0.1
metrics_port            = 0
slow_query_threshold_ms = 100
enable_query_logging    = false

# ── 日志（可与 MySQL 实例分文件，避免混写）────────────────────
[log]
level = INFO
file  = ./logs/proxy-pg.log
